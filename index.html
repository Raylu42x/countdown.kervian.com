/* ============ Date engine ============
   All occYear() outputs are local-time Date objects — holidays are intentionally
   anchored to each viewer's local calendar (Christmas at *your* midnight, etc).
   Custom countdowns can override this by carrying a TZ in the URL (see targetMs).
*/

// Anonymous Gregorian Easter algorithm. Returns {month, day} for a given year.
function easter(year) {
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return { month, day };
}

// Nth weekday of a month (e.g. 4th Thursday of November → Thanksgiving).
function nthWeekday(year, month, weekday, n, time) {
  const first = new Date(year, month - 1, 1);
  const shift = (weekday - first.getDay() + 7) % 7;
  return new Date(year, month - 1, 1 + shift + (n - 1) * 7, time[0], time[1], 0);
}

// Last weekday of a month (e.g. last Monday of May → Memorial Day).
function lastWeekday(year, month, weekday, time) {
  const last = new Date(year, month, 0);   // day 0 of next month = last day of this one
  const shift = (last.getDay() - weekday + 7) % 7;
  return new Date(year, month - 1, last.getDate() - shift, time[0], time[1], 0);
}

// Look up a year in a pre-published date table (used for lunar/astronomical events).
// Falls back to linear extrapolation outside the table so the countdown still works.
function tableYear(dates, year, time) {
  const parseISO = (s) => {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d, time[0], time[1], 0);
  };

  const exact = dates.find(s => +s.slice(0, 4) === year);
  if (exact) return parseISO(exact);

  const first = parseISO(dates[0]);
  const last = parseISO(dates[dates.length - 1]);
  const firstYear = +dates[0].slice(0, 4);
  const lastYear = +dates[dates.length - 1].slice(0, 4);
  const avgPeriod = (last.getTime() - first.getTime()) / (lastYear - firstYear);

  const anchor = year > lastYear ? last : first;
  const anchorYear = year > lastYear ? lastYear : firstYear;
  return new Date(anchor.getTime() + (year - anchorYear) * avgPeriod);
}

// Resolve one holiday's occurrence in a given year, using whatever rule it has.
function occYear(holiday, year) {
  const r = holiday.rule;
  const time = (r.time || '00:00').split(':').map(Number);

  switch (r.type) {
    case 'fixed':
      return new Date(year, r.month - 1, r.day, time[0], time[1], 0);
    case 'nth':
      return nthWeekday(year, r.month, r.weekday, r.n, time);
    case 'nthLast':
      return lastWeekday(year, r.month, r.weekday, time);
    case 'easter': {
      const e = easter(year);
      return new Date(year, e.month - 1, e.day, time[0], time[1], 0);
    }
    case 'easterOffset': {
      const e = easter(year);
      const d = new Date(year, e.month - 1, e.day, time[0], time[1], 0);
      d.setDate(d.getDate() + r.off);
      return d;
    }
    case 'table':
      return tableYear(r.dates, year, time);
    default:
      return new Date(year, 0, 1);
  }
}

// Find the next future occurrence of a holiday across the current and adjacent years.
function resolveMs(holiday) {
  try {
    const now = Date.now();
    const thisYear = new Date().getFullYear();
    for (let y = thisYear - 1; y <= thisYear + 2; y++) {
      const occ = occYear(holiday, y);
      if (occ && now < occ.getTime() + GRACE) return occ.getTime();
    }
    const fallback = occYear(holiday, thisYear + 1);
    return fallback ? fallback.getTime() : now + GRACE;
  } catch {
    return Date.now() + GRACE;
  }
}

function daysToMs(ms) {
  return Math.max(0, Math.ceil((ms - Date.now()) / 864e5));
}

// Convert a wall-clock date/time in a specific IANA timezone to UTC ms.
// JS has no built-in for this, so we make a guess, see how it renders in the
// target TZ, then offset by the difference. Two-step is enough for any TZ.
function wallTimeToUtcMs(year, month, day, hour, minute, tz) {
  const guess = Date.UTC(year, month - 1, day, hour, minute, 0);
  try {
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false
    });
    const parts = Object.fromEntries(
      fmt.formatToParts(new Date(guess)).map(p => [p.type, p.value])
    );
    const seenAsUtc = Date.UTC(
      +parts.year, +parts.month - 1, +parts.day,
      +parts.hour === 24 ? 0 : +parts.hour,   // some locales render midnight as 24
      +parts.minute, 0
    );
    return guess + (guess - seenAsUtc);
  } catch {
    return guess;   // unknown tz — treat input as UTC
  }
}

// Resolve the target instant the countdown is ticking toward.
// Custom countdowns honor a stored timezone so a shared URL hits the same instant
// for the viewer as it did for the creator. Holidays stay local to the viewer.
function targetMs() {
  if (st.isCustom) {
    const c = st.custom;
    const [y, m, d] = (c.dateISO || '').split('-').map(Number);
    const [h, mi] = (c.time || '00:00').split(':').map(Number);
    if (!y) return Date.now();
    if (c.tz) return wallTimeToUtcMs(y, m, d, h || 0, mi || 0, c.tz);
    return new Date(y, m - 1, d, h || 0, mi || 0, 0).getTime();
  }
  const h = byId(st.holidayId);
  return h ? resolveMs(h) : Date.now();
}

function remaining() {
  return Math.max(0, Math.floor((targetMs() - Date.now()) / 1000));
}

function getEmojiSet(){ if(st.isCustom){ const e=st.custom.emojiList; return (e&&e.length)?e:DEFAULT_EMOJIS; } const h=byId(st.holidayId); return (h&&h.emojis)||DEFAULT_EMOJIS; }
function timerEffect(){ if(st.isCustom) return st.custom.effect; const h=byId(st.holidayId); return h ? h.backgrounds[st.bg%h.backgrounds.length][0] : 'stars'; }
function timerPalette(){ if(st.isCustom){ const a=st.custom.accent; return [a, lighten(a,40), '#ffffff', lighten(a,80)]; } const h=byId(st.holidayId); return h ? h.particles : ['#ffffff']; }
function activeData() {
  if (st.isCustom) {
    const c = st.custom;
    const targetDate = new Date(targetMs());
    const greeting = (c.message && c.message.trim()) ? c.message : (c.title || 'It’s time');
    return {

      dateLabel: fmtDate(targetDate, c.tz)
    };
  }
  const h = byId(st.holidayId) || DATA[0];
  return {
    name: h.name,
    greeting: h.greeting,
    accent: h.accent,
    bg: h.bg,
    dateLabel: fmtDate(new Date(resolveMs(h)))
  };
}

/* ============ Hash / nav ============ */

// Encode the current view into the URL hash so it can be shared or restored.
function syncHash(push) {
  if (st.view !== 'timer') {
    history.replaceState(null, '', location.pathname);
    return;
  }

  let hash;
  if (st.isCustom) {
    const c = st.custom;
    const payload = {
      t: c.title,
      d: c.dateISO,
      tm: c.time,
      tz: c.tz,                // creator's timezone — required for shared URLs
      a: c.accent,
      e: c.effect,
      s: st.size,
      sp: st.speed,
      msg: c.message,
      el: c.emojiList,
      ed: c.emojiDir
    };
    hash = '#v=timer&c=' + encodeURIComponent(JSON.stringify(payload));
  } else {
    hash = `#v=timer&h=${st.holidayId}&bg=${st.bg}&sz=${st.size}&sp=${st.speed}`;
  }

  const url = location.pathname + hash;
  if (push) history.pushState(null, '', url);
  else history.replaceState(null, '', url);
}

// Restore state from the URL hash on load or popstate.
function parseHash() {
  try {
    const p = new URLSearchParams(location.hash.replace(/^#/, ''));
    if (p.get('v') !== 'timer') return;

    if (p.get('c')) {
      const c = JSON.parse(decodeURIComponent(p.get('c')));
      st.view = 'timer';
      st.isCustom = true;
      st.optionsOpen = false;
      st.size = c.s == null ? 0.5 : c.s;
      st.speed = c.sp == null ? 0.42 : c.sp;
      st.custom = {
        title: c.t || 'My Countdown',
        dateISO: c.d || defaultDate(),
        time: c.tm || '00:00',
        tz: c.tz || browserTz(),       // fall back to viewer's TZ for old URLs
        accent: c.a || '#f5c542',
        effect: c.e || 'confetti',
        message: c.msg || '',
        emojiList: (c.el && c.el.length) ? c.el : ['🎉', '🥳', '✨'],
        emojiDir: c.ed || 'fall'
      };
    } else if (p.get('h') && byId(p.get('h'))) {
      st.view = 'timer';
      st.isCustom = false;
      st.holidayId = p.get('h');
      st.bg = parseInt(p.get('bg') || '0', 10);
      st.size = parseFloat(p.get('sz')) || 0.5;
      st.speed = p.get('sp') == null ? 0.42 : parseFloat(p.get('sp'));
    }
  } catch {
    /* malformed hash — ignore and stay on home */
  }
}

function timerCenterHTML(){
  const A=activeData(), acc=A.accent;
  const rem=remaining();
  const bigMode=rem<=60&&rem>0, doneMode=rem<=0, boxMode=!bigMode&&!doneMode;
  const days=Math.floor(rem/86400), hh=Math.floor(rem%86400/3600), mm=Math.floor(rem%3600/60), ss=rem%60;
  const pad=x=>String(x).padStart(2,'0');
  const winW=st.winW||1200, winH=st.winH||800;

  let uarr=[{v:days,l:'Days'},{v:hh,l:'Hours'},{v:mm,l:'Minutes'},{v:ss,l:'Seconds'}];
  while(uarr.length>2 && uarr[0].v===0) uarr.shift();
  const N=uarr.length;
  const veryNarrow=winW<380;
  const cols = veryNarrow?1 : (winW>winH? N : Math.min(2,N));
  const rows=Math.ceil(N/cols), g=16;
  const cw=winW*0.94, boxW=(cw-(cols-1)*g)/cols;
  const gridH=Math.max(160,winH*0.56), boxH=(gridH-(rows-1)*g)/rows;
  const fitMax=Math.min(boxW*0.5, boxH*0.72);
  const size=st.size==null?0.5:st.size;
  const num=Math.max(24, fitMax*(0.42+0.58*size));
  const lab=Math.max(9, Math.min(16, num*0.13));
  const bigPx=Math.max(60, Math.min(winW*0.9, winH*0.86)*(0.5+0.5*size));

  const tTagStyle=`font:600 12px/1 'Space Grotesk';letter-spacing:.18em;text-transform:uppercase;color:${acc};opacity:.9;`;
  const tNameStyle=`margin:14px 0 0;font:400 clamp(34px,6vw,76px)/1 'Instrument Serif';color:#fff;letter-spacing:-.01em;`;
  const boxesStyle=`display:flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:${g}px;width:${Math.round(cw)}px;max-width:94vw;margin-top:clamp(16px,3.5vh,40px);`;
  const boxBase=`background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:18px;padding:${Math.round(num*0.2)}px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;`;
  const numBase=`font:700 ${Math.round(num)}px/1 'Space Grotesk';color:${acc};text-shadow:0 0 ${Math.round(num*0.3)}px ${acc}66;font-variant-numeric:tabular-nums;`;
  const labBase=`margin-top:${Math.max(5,Math.round(num*0.1))}px;font:600 ${Math.round(lab)}px/1 'Space Grotesk';letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);`;
  const bigStyle=`font:700 ${Math.round(bigPx)}px/0.9 'Space Grotesk';color:${acc};text-shadow:0 0 ${Math.round(bigPx*0.3)}px ${acc};animation:cdpulse .9s infinite;margin-top:10px;`;
  const greetStyle=`font:400 clamp(40px,8vw,98px)/1 'Instrument Serif';font-style:italic;color:${acc};text-shadow:0 0 50px ${acc}55;`;
  const tLabelStyle=labBase;

  let body='';
  if(boxMode){
    const cells=uarr.map(u=>{
      const value=(u.l==='Days'?String(u.v):pad(u.v));
      const flexCalc=`flex:0 0 calc((100% - ${(cols-1)*g}px) / ${cols});`;
      return `<div style="${boxBase}${flexCalc}"><div style="${numBase}">${value}</div><div style="${labBase}">${u.l}</div></div>`;
    }).join('');
    body=`<div style="${boxesStyle}">${cells}</div>`;
  } else if(bigMode){
    body=`<div style="${bigStyle}">${pad(ss)}</div><div style="${tLabelStyle}">seconds to go</div>`;
  } else if(doneMode){
    body=`<div style="${greetStyle}">${escHtml(A.greeting)}</div><div style="margin-top:14px;font:500 13px/1 'Space Grotesk';letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.55);">The moment is here</div>`;
  }
  return `<div style="${tTagStyle}">${escHtml(A.dateLabel)}</div><h2 style="${tNameStyle}">${escHtml(A.name)}</h2>${body}`;
}

        <span style="flex:1;text-align:left;font:600 13px/1 'Space Grotesk';color:#fff;">${escHtml(e.label)}</span>

      const active=st.bg===i;
      return `<button data-bg-idx="${i}" style="${rowStyle(active,acc)}">
        <canvas data-opt-idx="${i}" style="width:42px;height:42px;border-radius:9px;flex:none;background:linear-gradient(160deg,#14121d,#0a0810);box-shadow:inset 0 0 10px rgba(0,0,0,.5);"></canvas>

      <div style="display:flex;gap:9px;">
        <button data-dir="fall" style="${dirBtnStyle(edir==='fall')}">Fall ↓</button>
        <button data-dir="rise" style="${dirBtnStyle(edir==='rise')}">Rise ↑</button>
      </div>
    </div>`;
  }

  const copyLabel = st.copied?'Copied!':'Copy share link';
  const size=st.size==null?0.5:st.size;
  const speed=st.speed==null?0.42:st.speed;

  return `<div style="position:absolute;top:0;right:0;height:100%;width:min(380px,88vw);background:rgba(10,9,18,.82);backdrop-filter:blur(22px);border-left:1px solid rgba(255,255,255,.1);z-index:6;overflow-y:auto;padding:74px 22px 28px;animation:cdpanel .3s both;">
    ${custFields}

    <input id="size-slider" type="range" min="0" max="1" step="0.01" value="${size}" style="width:100%;accent-color:#f5c542;height:24px;cursor:pointer;margin:0 0 20px;">

    <input id="speed-slider" type="range" min="0" max="1" step="0.01" value="${speed}" style="width:100%;accent-color:#f5c542;height:24px;cursor:pointer;margin:0 0 22px;">
    <div style="font:600 11px/1 'Space Grotesk';letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:13px;">Canvas</div>
    <div style="display:flex;flex-direction:column;gap:9px;">${bgRowsHTML}</div>
    ${emojiBuilder}
    <div style="margin-top:26px;padding-top:22px;border-top:1px solid rgba(255,255,255,.09);">
      <button id="copy-link-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:9px;font:600 13px/1 'Space Grotesk';color:#0a0820;background:linear-gradient(135deg,#fde68a,#f5c542);border:none;padding:13px;border-radius:12px;cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"></path><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"></path></svg>

/* ============ View transitions ============ */
function goHome(){
  st.view='home';
  hoverId=null;
  timerCanvas=null; tsurf=null;
  optCanvases={}; optSurf={}; optMetaArr=[];
  document.getElementById('app').innerHTML = homeFullHTML();
  bindHome();
  history.replaceState(null,'',location.pathname);
}
function goAbout(){
  st.view='about';
  hoverId=null;
  timerCanvas=null; tsurf=null;
  cardCanvases={};
  document.getElementById('app').innerHTML = aboutHTML();
  bindAbout();
  history.replaceState(null,'',location.pathname);
}
function goTimer(push){
  st.view='timer';
  hoverId=null;
  cardCanvases={};
  if(msurf){ try{msurf.ctx.clearRect(0,0,msurf.canvas.width,msurf.canvas.height);}catch(e){} msurf=null; }
  document.getElementById('app').innerHTML = timerFullHTML();
  bindTimer();
  syncHash(push);
}
function updateGrid(){
  const g = document.getElementById('home-grid');
  if(!g) return;
  cardCanvases = {};
  g.innerHTML = gridHTML();
  bindGrid();
  // Update filter chip styles
  const counts={all:DATA.length};
  for(const k of ['religious','cultural','national','seasonal','fun']) counts[k]=DATA.filter(h=>h.cat===k).length;
  document.querySelectorAll('[data-filter]').forEach(btn=>{
    const k=btn.getAttribute('data-filter');
    const active=st.filter===k;
    btn.setAttribute('style', "font:600 13px/1 'Space Grotesk';letter-spacing:.02em;padding:10px 16px;border-radius:999px;cursor:pointer;transition:all .25s;"+(active
      ? 'color:#0a0820;background:#ece9f5;border:1px solid #ece9f5;'
      : 'color:rgba(255,255,255,.74);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);'));
  });
}
function updateTimerContent(){
  const el = document.getElementById('timer-center');
  if(el) el.innerHTML = timerCenterHTML();
}
function updateOptionsPanel(){
  const el = document.getElementById('timer-panel');
  if(!el) return;
  optCanvases={};
  el.innerHTML = st.optionsOpen ? optionsPanelHTML() : '';
  // Re-find timer canvas (it should still exist since panel is sibling)
  timerCanvas = document.getElementById('timer-canvas');
  bindOptionsPanel();
}

/* ============ Bind ============ */
function bindHome(){
  document.getElementById('about-btn')?.addEventListener('click', goAbout);
  document.getElementById('create-btn')?.addEventListener('click', openCustom);
  document.querySelectorAll('[data-filter]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ st.filter=btn.getAttribute('data-filter'); updateGrid(); });
  });
  bindGrid();
}
function bindGrid(){
  cardCanvases = {};
  document.querySelectorAll('[data-card-id]').forEach(cv=>{
    cardCanvases[cv.getAttribute('data-card-id')] = cv;
  });
  document.querySelectorAll('[data-holiday]').forEach(card=>{
    const id=card.getAttribute('data-holiday');
    const h=byId(id);
    if(!h) return;
    card.addEventListener('click', ()=> openHoliday(id));
    card.addEventListener('mouseenter', ()=>{
      hoverId = id;
      card.style.transform='translateY(-6px) scale(1.012)';
      card.style.borderColor=h.accent+'88';
      card.style.boxShadow=`0 20px 52px -14px ${h.accent}66`;
    });
    card.addEventListener('mouseleave', ()=>{
      if(hoverId===id) hoverId=null;
      card.style.transform='';
      card.style.borderColor='rgba(255,255,255,.08)';
      card.style.boxShadow='';
    });
  });
  const tile=document.getElementById('create-tile');
  if(tile){
    tile.addEventListener('click', openCustom);
    tile.addEventListener('mouseenter', ()=>{
      tile.style.borderColor='rgba(245,197,66,.6)';
      tile.style.background='rgba(245,197,66,.05)';
    });
    tile.addEventListener('mouseleave', ()=>{
      tile.style.borderColor='rgba(255,255,255,.18)';
      tile.style.background='rgba(255,255,255,.02)';
    });
  }
}
function bindAbout(){
  document.getElementById('about-back')?.addEventListener('click', goHome);
  document.getElementById('about-create')?.addEventListener('click', openCustom);
  document.getElementById('about-browse')?.addEventListener('click', goHome);
}
function bindTimer(){
  timerCanvas = document.getElementById('timer-canvas');
  document.getElementById('timer-back')?.addEventListener('click', goHome);
  document.getElementById('timer-opts-btn')?.addEventListener('click', ()=>{
    st.optionsOpen = !st.optionsOpen;
    updateOptionsPanel();
  });
  bindOptionsPanel();
}
function bindOptionsPanel(){
  optCanvases = {};
  document.querySelectorAll('[data-opt-idx]').forEach(cv=>{
    optCanvases[+cv.getAttribute('data-opt-idx')] = cv;
  });

  if(!st.optionsOpen) return;

  // Text inputs - input event, no re-render (preserve focus)
  document.getElementById('custom-title')?.addEventListener('input', e=>{
    st.custom.title = e.target.value; st.done=false; syncHash();
  });
  document.getElementById('custom-message')?.addEventListener('input', e=>{
    st.custom.message = e.target.value; st.done=false; syncHash();
  });
  document.getElementById('custom-date')?.addEventListener('input', e=>{
    st.custom.dateISO = e.target.value; st.done=false; syncHash();
  });
  document.getElementById('custom-time')?.addEventListener('input', e=>{
    st.custom.time = e.target.value; st.done=false; syncHash();
  });
  document.getElementById('custom-title')?.addEventListener('focus', e=>{ try{e.target.select();}catch(_){} });

  // Sliders - re-render only timer center (size affects display), no panel rebuild
  document.getElementById('size-slider')?.addEventListener('input', e=>{
    st.size=+e.target.value; syncHash(); updateTimerContent();
  });
  document.getElementById('speed-slider')?.addEventListener('input', e=>{
    st.speed=+e.target.value; syncHash();
  });

  // Swatches - rerender panel
  document.querySelectorAll('[data-swatch]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      st.custom.accent = btn.getAttribute('data-swatch');
      st.done=false; tsurf=null; syncHash();
      updateOptionsPanel();
    });
  });

  // Canvas options
  document.querySelectorAll('[data-effect]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      st.custom.effect = btn.getAttribute('data-effect');
      tsurf=null; syncHash();
      updateOptionsPanel();
    });
  });
  document.querySelectorAll('[data-bg-idx]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      st.bg = +btn.getAttribute('data-bg-idx');
      tsurf=null; syncHash();
      updateOptionsPanel();
    });
  });

  // Emoji toggles
  document.querySelectorAll('[data-emoji]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const g=btn.getAttribute('data-emoji');
      const cur=st.custom.emojiList||[];
      let nl;
      if(cur.includes(g)) nl=cur.filter(x=>x!==g);
      else if(cur.length<5) nl=[...cur,g];
      else return;
      st.custom.emojiList=nl; st.done=false; tsurf=null; syncHash();
      updateOptionsPanel();
    });
  });

  // Direction
  document.querySelectorAll('[data-dir]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      st.custom.emojiDir = btn.getAttribute('data-dir');
      st.done=false; tsurf=null; syncHash();
      updateOptionsPanel();
    });
  });

  // Copy link
  document.getElementById('copy-link-btn')?.addEventListener('click', ()=>{
    syncHash();
    try{ navigator.clipboard.writeText(location.href); }catch(e){}
    st.copied=true;
    updateOptionsPanel();
    clearTimeout(copyTimer);
    copyTimer=setTimeout(()=>{ st.copied=false; if(st.view==='timer' && st.optionsOpen) updateOptionsPanel(); }, 1600);
  });
}

/* ============ Navigation actions ============ */
function openHoliday(id){
  st.isCustom=false; st.holidayId=id; st.bg=0; st.optionsOpen=false;
  st.done = remaining()<=0;
  tsurf=null;
  goTimer(true);
}
function openCustom(){
  st.isCustom=true; st.optionsOpen=true; st.done=false;
  tsurf=null;
  goTimer(true);
}

/* ============ Tick ============ */
function startTimer(){
  setInterval(()=>{
    if(st.view!=='timer') return;
    const rem = remaining();
    st.done = rem<=0;
    st.tick++;
    updateTimerContent();
  }, 200);
}

/* ============ Canvas engine ============ */
function makeSurface(canvas,effectId,palette,emojis,dir){
  return { canvas, ctx:canvas.getContext('2d'), parts:[], effectId, palette, emojis:emojis||DEFAULT_EMOJIS, dir:dir||'fall', t:0, acc:0, stars:null, starsW:0, w:0, h:0 };
}
function warm(s){ try{ for(let i=0;i<18;i++) drawSurface(s,0.08);}catch(e){} }
function ensureSize(s){
  const r=s.canvas.getBoundingClientRect();
  const dpr=Math.min(2, window.devicePixelRatio||1);
  const w=Math.max(1,Math.round(r.width*dpr)), h=Math.max(1,Math.round(r.height*dpr));
  if(s.canvas.width!==w) s.canvas.width=w;
  if(s.canvas.height!==h) s.canvas.height=h;
  s.w=w; s.h=h;
}
function velMul(){ const sp=st.speed==null?0.42:st.speed; return 0.25+1.4*sp; }
function rateMul(){ const sp=st.speed==null?0.42:st.speed; return 0.55+0.6*sp; }

function drawSurface(s,dt){
  ensureSize(s);
  const ctx=s.ctx, w=s.w, h=s.h; if(!w||!h) return;
  const sc=Math.max(0.5, h/780);
  let af=(w*h)/(1500*820);
  s.t+=dt; ctx.clearRect(0,0,w,h);
  const e=s.effectId;
  if(e==='stars'){ drawStars(s,af,sc,false); return; }
  if(['lanterns','bats','embers','rockets','balloons'].includes(e)) drawStars(s,af*0.5,sc,true);
  spawn(s,dt,af,sc,w,h);
  const keep=[];
  for(const p of s.parts){ if(updP(p,dt,s,w,h)){ drawP(ctx,p); keep.push(p);} }
  s.parts=keep;
}

function drawStars(s,af,sc,faint){
  const ctx=s.ctx, w=s.w, h=s.h;
  if(!s.stars || s.starsW!==w){
    const n=Math.min(240, Math.round((faint?28:80)*Math.max(0.3,af)));
    s.stars=[];
    for(let i=0;i<n;i++){
      s.stars.push({x:Math.random()*w,y:Math.random()*h*0.94,r:rnd(0.5,1.9)*sc,ph:Math.random()*6.28,tw:rnd(0.5,1.8),big:Math.random()<0.12,col:pick(['#ffffff','#cfe0ff','#ffe9b0'])});
    }
    s.starsW=w;
  }
  for(const star of s.stars){
    const a=(faint?0.15:0.35)+(faint?0.16:0.5)*Math.abs(Math.sin(s.t*star.tw+star.ph));
    ctx.globalAlpha=a; ctx.fillStyle=star.col;
    if(star.big && !faint){
      ctx.save(); ctx.translate(star.x,star.y);
      const r=star.r*2.4;
      ctx.beginPath();
      ctx.moveTo(0,-r);ctx.lineTo(r*0.22,-r*0.22);ctx.lineTo(r,0);ctx.lineTo(r*0.22,r*0.22);
      ctx.lineTo(0,r);ctx.lineTo(-r*0.22,r*0.22);ctx.lineTo(-r,0);ctx.lineTo(-r*0.22,-r*0.22);
      ctx.closePath();ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(star.x,star.y,star.r,0,6.2832); ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

function spawn(s,dt,af,sc,w,h){
  const e=s.effectId, rm=rateMul(), vm=velMul();
  if(e==='fireworks'){
    s.acc += dt*1.15*rm*Math.max(0.5,Math.min(2.4,af));
    while(s.acc>1){
      s.acc-=1;
      s.parts.push({shape:'rocket',kind:'rocket',x:rnd(w*0.14,w*0.86),y:h+10,vy:-rnd(0.55,0.82)*h*vm,targetY:rnd(h*0.1,h*0.46),size:rnd(1.6,2.6)*sc,color:pick(s.palette),alpha:1});
    }
    return;
  }
  const c=CFG[e]; if(!c || s.parts.length>200) return;
  s.acc += dt*c.rate*rm*Math.max(0.25,af);
  while(s.acc>1){ s.acc-=1; spawnOne(s,c,sc,w,h); }
}
function spawnOne(s,c,sc,w,h){
  const vm=velMul();
  const col=pick(s.palette), size=rnd(c.size[0],c.size[1])*sc;
  const base={shape:c.shape,color:col,size,rot:Math.random()*6.28,vr:rnd(-c.spin,c.spin),phase:Math.random()*6.28,sway:c.sway*sc,alpha:1};
  if(c.shape==='emoji') base.glyph=pick(s.emojis||DEFAULT_EMOJIS);
  let kind=c.kind; if(c.shape==='emoji' && s.dir==='rise') kind='rise';
  if(kind==='fall'){
    s.parts.push(Object.assign({},base,{kind:'fall',x:Math.random()*w,y:-22*sc,vx:rnd(-8,8)*sc*vm,vy:rnd(c.vy[0],c.vy[1])*sc*vm,ay:0}));
  } else if(kind==='rise'){
    const lf=c.life||[4,7]; const life=rnd(lf[0],lf[1]);
    s.parts.push(Object.assign({},base,{kind:'rise',x:Math.random()*w,y:h+22*sc,vx:rnd(-6,6)*sc*vm,vy:-rnd(c.vy[0],c.vy[1])*sc*vm,ay:0,life,max:life}));
  } else if(kind==='cross'){
    const fromL=Math.random()<0.5; const sp=rnd(110,200)*sc*vm;
    s.parts.push(Object.assign({},base,{kind:'cross',x:fromL?-40:w+40,y:rnd(h*0.1,h*0.62),vx:fromL?sp:-sp,vy:0,ay:0,phase:Math.random()*6.28}));
  }
}

function updP(p,dt,s,w,h){
  if(p.shape==='rocket'){ p.y+=p.vy*dt; if(p.y<=p.targetY){ explode(s,p); return false; } return true; }
  if(p.shape==='spark'){ p.vy+=p.ay*dt; p.vx*=0.985; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.alpha=Math.max(0,p.life/p.max); return p.life>0; }
  if(p.ay) p.vy+=p.ay*dt;
  if(p.kind==='cross'){ p.x+=p.vx*dt; p.y+=Math.sin(s.t*4+p.phase)*16*dt; return p.x>-80 && p.x<w+80; }
  p.x += (p.vx + Math.sin(s.t*1.5+p.phase)*p.sway)*dt;
  p.y += p.vy*dt; p.rot += p.vr*dt;
  if(p.max!=null){ p.life-=dt; const el=p.max-p.life; p.alpha=Math.max(0,Math.min(1,Math.min(el/0.5,p.life/1.0))); if(p.life<=0) return false; }
  if(p.vy>0) return p.y<h+44;
  return p.y>-66;
}
function explode(s,p){
  const n=20+(Math.random()*16|0);
  for(let i=0;i<n;i++){
    const a=6.2832*i/n+rnd(-0.1,0.1), sp=rnd(50,175)*(p.size/2.2+0.4);
    const life=rnd(0.7,1.5);
    s.parts.push({shape:'spark',kind:'spark',x:p.x,y:p.targetY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,ay:60,size:rnd(1.5,3.4),color:Math.random()<0.28?'#ffffff':p.color,life,max:life,alpha:1});
  }
}

function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawP(ctx,p){
  ctx.globalAlpha=p.alpha==null?1:p.alpha;
  const z=p.size;
  switch(p.shape){
    case 'circle': ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,z,0,6.2832); ctx.fill(); break;
    case 'rect': ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color; ctx.fillRect(-z,-z*0.5,z*2,z*0.92); ctx.restore(); break;
    case 'leaf': ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color; ctx.beginPath(); ctx.ellipse(0,0,z,z*0.5,0,0,6.2832); ctx.fill(); ctx.restore(); break;
    case 'petal': ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color; ctx.beginPath(); ctx.ellipse(0,0,z*0.55,z,0,0,6.2832); ctx.fill(); ctx.restore(); break;
    case 'rain': ctx.save(); ctx.strokeStyle=p.color; ctx.globalAlpha=(p.alpha==null?1:p.alpha)*0.6; ctx.lineWidth=Math.max(1,z*0.16); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,p.y+z*1.7); ctx.stroke(); ctx.restore(); break;
    case 'sparkle4': { ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color; const r=z; ctx.beginPath(); ctx.moveTo(0,-r); ctx.quadraticCurveTo(0,0,r,0); ctx.quadraticCurveTo(0,0,0,r); ctx.quadraticCurveTo(0,0,-r,0); ctx.quadraticCurveTo(0,0,0,-r); ctx.fill(); ctx.restore(); break; }
    case 'emoji': ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*0.4); ctx.font=Math.round(z*2.1)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.glyph||'⭐',0,0); ctx.restore(); break;
    case 'shamrock': { ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color; const r=z*0.46; ctx.beginPath(); ctx.arc(-r*0.8,-r*0.2,r,0,6.2832); ctx.arc(r*0.8,-r*0.2,r,0,6.2832); ctx.arc(0,-r*1.2,r,0,6.2832); ctx.fill(); ctx.strokeStyle=p.color; ctx.lineWidth=z*0.16; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,z*0.95); ctx.stroke(); ctx.restore(); break; }
    case 'heart': { ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*0.3); ctx.fillStyle=p.color; const k=z; ctx.beginPath(); ctx.moveTo(0,k*0.32); ctx.bezierCurveTo(0,-k*0.12,-k,-k*0.12,-k,k*0.34); ctx.bezierCurveTo(-k,k*0.74,0,k*0.96,0,k*1.12); ctx.bezierCurveTo(0,k*0.96,k,k*0.74,k,k*0.34); ctx.bezierCurveTo(k,-k*0.12,0,-k*0.12,0,k*0.32); ctx.fill(); ctx.restore(); break; }
    case 'lantern': { ctx.save(); ctx.translate(p.x,p.y); ctx.shadowColor=p.color; ctx.shadowBlur=z*1.7; ctx.fillStyle=p.color; rr(ctx,-z*0.5,-z*0.7,z,z*1.4,z*0.34); ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=(p.alpha==null?1:p.alpha)*0.7; ctx.fillStyle='rgba(255,248,220,0.9)'; ctx.beginPath(); ctx.ellipse(0,0,z*0.26,z*0.4,0,0,6.2832); ctx.fill(); ctx.restore(); break; }
    case 'ember': { ctx.save(); ctx.shadowColor=p.color; ctx.shadowBlur=z*3.2; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,z*0.7,0,6.2832); ctx.fill(); ctx.restore(); break; }
    case 'balloon': { ctx.save(); ctx.translate(p.x,p.y); ctx.fillStyle=p.color; ctx.beginPath(); ctx.ellipse(0,0,z*0.7,z,0,0,6.2832); ctx.fill(); ctx.beginPath(); ctx.moveTo(-z*0.12,z); ctx.lineTo(z*0.12,z); ctx.lineTo(0,z*1.16); ctx.closePath(); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,z*1.16); ctx.quadraticCurveTo(z*0.2,z*1.5,0,z*1.9); ctx.stroke(); ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.ellipse(-z*0.26,-z*0.34,z*0.15,z*0.24,0.5,0,6.2832); ctx.fill(); ctx.restore(); break; }
    case 'bubble': { ctx.save(); ctx.translate(p.x,p.y); ctx.strokeStyle=p.color; ctx.globalAlpha=(p.alpha==null?1:p.alpha)*0.85; ctx.lineWidth=Math.max(1,z*0.12); ctx.beginPath(); ctx.arc(0,0,z,0,6.2832); ctx.stroke(); ctx.globalAlpha=(p.alpha==null?1:p.alpha)*0.55; ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(-z*0.32,-z*0.32,z*0.16,0,6.2832); ctx.fill(); ctx.restore(); break; }
    case 'rocket2': { ctx.save(); ctx.translate(p.x,p.y); ctx.fillStyle=p.color; rr(ctx,-z*0.32,-z*0.8,z*0.64,z*1.3,z*0.2); ctx.fill(); ctx.beginPath(); ctx.moveTo(-z*0.32,-z*0.5); ctx.lineTo(0,-z*1.15); ctx.lineTo(z*0.32,-z*0.5); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(-z*0.32,z*0.2); ctx.lineTo(-z*0.6,z*0.62); ctx.lineTo(-z*0.32,z*0.5); ctx.closePath(); ctx.moveTo(z*0.32,z*0.2); ctx.lineTo(z*0.6,z*0.62); ctx.lineTo(z*0.32,z*0.5); ctx.closePath(); ctx.fill(); ctx.fillStyle='rgba(255,255,255,.75)'; ctx.beginPath(); ctx.arc(0,-z*0.25,z*0.16,0,6.2832); ctx.fill(); ctx.fillStyle=(Math.random()<0.5?'#ffd166':'#ff7a18'); ctx.shadowColor='#ff7a18'; ctx.shadowBlur=z; ctx.beginPath(); ctx.moveTo(-z*0.18,z*0.5); ctx.lineTo(0,z*(0.9+Math.random()*0.5)); ctx.lineTo(z*0.18,z*0.5); ctx.closePath(); ctx.fill(); ctx.restore(); break; }
    case 'butterfly': { ctx.save(); ctx.translate(p.x,p.y); const fl=Math.abs(Math.sin(p.x*0.05))*0.7+0.3; ctx.fillStyle=p.color; ctx.beginPath(); ctx.ellipse(-z*0.5*fl,-z*0.3,z*0.5*fl,z*0.42,0.5,0,6.2832); ctx.fill(); ctx.beginPath(); ctx.ellipse(z*0.5*fl,-z*0.3,z*0.5*fl,z*0.42,-0.5,0,6.2832); ctx.fill(); ctx.beginPath(); ctx.ellipse(-z*0.42*fl,z*0.32,z*0.4*fl,z*0.32,-0.4,0,6.2832); ctx.fill(); ctx.beginPath(); ctx.ellipse(z*0.42*fl,z*0.32,z*0.4*fl,z*0.32,0.4,0,6.2832); ctx.fill(); ctx.fillStyle='rgba(20,20,30,.85)'; ctx.beginPath(); ctx.ellipse(0,0,z*0.1,z*0.5,0,0,6.2832); ctx.fill(); ctx.restore(); break; }
    case 'spark': { ctx.save(); ctx.shadowColor=p.color; ctx.shadowBlur=z*2.4; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,z*0.8,0,6.2832); ctx.fill(); ctx.restore(); break; }
    case 'bat': { ctx.save(); ctx.translate(p.x,p.y); const dir=p.vx<0?-1:1; ctx.scale(dir,1); ctx.fillStyle=p.color; const f=Math.sin(p.x*0.06)*z*0.4; ctx.beginPath(); ctx.arc(0,0,z*0.34,0,6.2832); ctx.moveTo(0,0); ctx.quadraticCurveTo(-z*0.9,-z*0.5+f,-z*1.4,z*0.05); ctx.quadraticCurveTo(-z*0.75,z*0.12,0,z*0.28); ctx.moveTo(0,0); ctx.quadraticCurveTo(z*0.9,-z*0.5+f,z*1.4,z*0.05); ctx.quadraticCurveTo(z*0.75,z*0.12,0,z*0.28); ctx.fill(); ctx.restore(); break; }
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

/* ============ RAF loop ============ */
let lastRafTime = performance.now(), rafFrame = 0;
function rafLoop(now){
  let dt=(now-lastRafTime)/1000; lastRafTime=now;
  if(!(dt>0)||dt>0.06) dt=0.03;
  rafFrame++;
  try{
    // Timer canvas
    if(st.view==='timer' && timerCanvas){
      const eid=timerEffect(), pal=timerPalette();
      const dir=st.isCustom?st.custom.emojiDir:'fall';
      const key=eid+'|'+pal.join(',')+'|'+dir;
      if(!tsurf || tsurf.canvas!==timerCanvas || tsurf.key!==key){
        tsurf=makeSurface(timerCanvas,eid,pal,getEmojiSet(),dir);
        tsurf.key=key; warm(tsurf);
      }
      drawSurface(tsurf,dt);
    }
    // Option thumbnails
    if(st.view==='timer' && st.optionsOpen && rafFrame%2===0){
      for(const k in optCanvases){
        const cv=optCanvases[k], meta=optMetaArr[k];
        if(!cv||!meta) continue;
        const key=meta.effect+'|'+meta.palette.join(',')+'|'+(meta.dir||'fall');
        if(!optSurf[k]||optSurf[k].canvas!==cv||optSurf[k].key!==key){
          optSurf[k]=makeSurface(cv,meta.effect,meta.palette,meta.emojis,meta.dir);
          optSurf[k].key=key; warm(optSurf[k]);
        }
        drawSurface(optSurf[k],dt*2);
      }
    } else if(!st.optionsOpen && Object.keys(optSurf).length){
      optSurf={};
    }
    // Card hover
    if(st.view==='home' && hoverId && cardCanvases[hoverId]){
      const ho=byId(hoverId), cv=cardCanvases[hoverId];
      if(msurf && (msurf.canvas!==cv || msurf.id!==hoverId)){
        try{ msurf.ctx.clearRect(0,0,msurf.canvas.width,msurf.canvas.height);}catch(e){}
        msurf=null;
      }
      if(!msurf){ msurf=makeSurface(cv,ho.backgrounds[0][0],ho.particles,ho.emojis); msurf.id=hoverId; warm(msurf); }
      drawSurface(msurf,dt);
    } else if(msurf){
      try{ msurf.ctx.clearRect(0,0,msurf.canvas.width,msurf.canvas.height);}catch(e){}
      msurf=null;
    }
  }catch(e){}
  requestAnimationFrame(rafLoop);
}

/* ============ Init ============ */
function init(){
  parseHash();
  if(st.view==='timer'){ st.done=remaining()<=0; goTimer(false); }
  else { goHome(); }
  startTimer();
  requestAnimationFrame(rafLoop);
  window.addEventListener('popstate', ()=>{ if(st.view==='timer') goHome(); });
  window.addEventListener('resize', ()=>{
    st.winW=window.innerWidth; st.winH=window.innerHeight;
    if(msurf) msurf.stars=null;
    if(tsurf) tsurf.stars=null;
    if(st.view==='timer') updateTimerContent();
  });
  window.addEventListener('hashchange', ()=>{
    // Allow external hash-based deep linking
  });
}
init();
})();
</script>
